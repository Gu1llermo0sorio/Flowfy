<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 140" width="400" height="140">
  <defs>
    <!-- Main gradient: deep teal to vibrant emerald -->
    <linearGradient id="flowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D9488;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>

    <!-- Accent gradient: indigo to violet -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0D948833" flood-opacity="1"/>
    </filter>

    <!-- Icon bg gradient -->
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E293B;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- === ICON MARK === -->
  <!-- Rounded square background -->
  <rect x="10" y="10" width="120" height="120" rx="28" ry="28" fill="url(#iconBg)" filter="url(#shadow)"/>

  <!-- Flow wave lines — representing money flow -->
  <!-- Wave 1 (bottom, wide, teal) -->
  <path d="M 28 95 Q 45 78 62 88 Q 79 98 96 82 Q 108 70 115 65"
        stroke="url(#flowGrad)" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- Wave 2 (mid, medium, teal) -->
  <path d="M 28 78 Q 45 60 62 72 Q 79 84 96 65 Q 108 52 115 48"
        stroke="url(#flowGrad)" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.75"/>

  <!-- Wave 3 (top, narrow, brighter) -->
  <path d="M 28 60 Q 45 42 62 55 Q 79 68 96 48 Q 108 34 115 30"
        stroke="url(#flowGrad)" stroke-width="5.5" stroke-linecap="round" fill="none" filter="url(#glow)"/>

  <!-- Accent dot — rising star / goal indicator -->
  <circle cx="115" cy="30" r="7" fill="url(#accentGrad)" filter="url(#glow)"/>
  <!-- Inner white dot -->
  <circle cx="115" cy="30" r="3" fill="white" opacity="0.9"/>

  <!-- Upward arrow tip suggesting growth -->
  <polyline points="108,38 115,30 122,38"
            stroke="url(#accentGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- === WORDMARK === -->
  <!-- "flow" in bold dark slate -->
  <text x="148" y="88"
        font-family="'Georgia', 'Palatino', serif"
        font-size="58"
        font-weight="700"
        letter-spacing="-2"
        fill="#0F172A">flow</text>

  <!-- "fy" in gradient teal/emerald -->
  <text x="290" y="88"
        font-family="'Georgia', 'Palatino', serif"
        font-size="58"
        font-weight="700"
        letter-spacing="-2"
        fill="url(#flowGrad)">fy</text>

  <!-- Tagline -->
  <text x="149" y="112"
        font-family="'Helvetica Neue', 'Arial', sans-serif"
        font-size="13"
        font-weight="400"
        letter-spacing="3.5"
        fill="#64748B">FAMILY FINANCE</text>

  <!-- Subtle accent line under tagline -->
  <line x1="149" y1="118" x2="252" y2="118" stroke="url(#accentGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
</svg>
